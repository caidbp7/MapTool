<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zone Mapper — AU/NZ (Spatial Edition)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111111;--surface2:#1a1a1a;--border:#2a2a2a;
  --text:#ffffff;--muted:#666666;--muted2:#333333;
  --ca:#f15d22;--cb:#ffffff;--cc:#f15d22;--cd:#f17a4a;
  --added:rgba(241,93,34,.22);--removed:rgba(255,255,255,.15);--unchanged:rgba(241,93,34,.10);
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap;min-height:46px}
.logo{font-size:.9rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ca);white-space:nowrap;flex-shrink:0}
.logo span{color:var(--text)}.logo sub{font-size:.55rem;color:var(--muted);vertical-align:baseline;margin-left:4px;letter-spacing:.1em}
.map-tabs-bar{display:flex;align-items:center;gap:4px;flex:1;overflow-x:auto;min-width:0}
.map-tabs-bar::-webkit-scrollbar{height:0}
.map-tab{display:flex;align-items:center;gap:5px;padding:4px 9px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .18s;user-select:none}
.map-tab:hover{color:var(--text);border-color:#3a4050}
.map-tab.active{color:var(--ca);border-color:var(--ca);background:rgba(241,93,34,.06)}
.tab-close{width:13px;height:13px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:.8rem;color:var(--muted);transition:all .15s;cursor:pointer}
.tab-close:hover{background:rgba(200,200,200,.2);color:var(--cb)}
.add-map-btn{padding:4px 9px;background:transparent;border:1px dashed var(--border);border-radius:6px;color:var(--muted);font-family:'Space Mono',monospace;font-size:.68rem;cursor:pointer;transition:all .18s;flex-shrink:0;white-space:nowrap}
.add-map-btn:hover{color:var(--cc);border-color:var(--cc)}
.version-toggle{display:flex;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:3px;flex-shrink:0}
.v-btn{font-family:'Space Mono',monospace;font-size:.65rem;font-weight:700;padding:4px 11px;border-radius:4px;border:none;cursor:pointer;transition:all .18s;background:transparent;color:var(--muted);letter-spacing:.04em}
.v-btn.va{background:var(--ca);color:#fff}.v-btn.vdiff{background:linear-gradient(90deg,var(--ca),#ffffff);color:#000}.v-btn.vb{background:#ffffff;color:#000}
.legend{display:flex;gap:10px;align-items:center;font-family:'Space Mono',monospace;font-size:.6rem;flex-shrink:0}
.legend-item{display:flex;align-items:center;gap:4px;opacity:.75}
.ldot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:300px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.stabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stab{flex:1;padding:7px 4px;font-family:'Space Mono',monospace;font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:none;cursor:pointer;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap}
.stab.sa{color:var(--ca);border-bottom-color:var(--ca)}
.map-name-row{display:flex;align-items:center;gap:6px;padding:8px 12px 0;flex-shrink:0}
.mn-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'Syne',sans-serif;font-size:.74rem;font-weight:600;padding:4px 8px;outline:none}
.spane{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}

/* ── POSTCODE TABLE ── */
.pc-table-wrap{flex:1;overflow-y:auto;border:1px solid var(--border);background:var(--bg)}
.pc-table{width:100%;border-collapse:collapse;font-family:'Space Mono',monospace;font-size:.62rem}
.pc-table th{position:sticky;top:0;background:var(--surface2);color:var(--muted);padding:5px 7px;text-align:left;border-bottom:1px solid var(--border)}
.pc-table td{padding:4px 7px;border-bottom:1px solid var(--muted2)}
.pc-cb{accent-color:var(--ca)}

/* ── SUPABASE UI ── */
.db-status{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:.6rem;flex-shrink:0}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
.db-dot.connected{background:#44ff44}.db-dot.error{background:#ff4444}.db-dot.saving{background:var(--ca);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.save-btn{padding:4px 12px;background:var(--ca);color:#fff;border:none;border-radius:6px;font-weight:700;font-size:.68rem;cursor:pointer}
.load-btn{padding:4px 12px;background:transparent;color:var(--ca);border:1px solid var(--ca);border-radius:6px;font-weight:700;font-size:.68rem;cursor:pointer}

/* ── MAP AREA ── */
.map-area{flex:1;position:relative;overflow:hidden;background:#0d0f14}
.map-slot{position:absolute;inset:0;display:none}
.map-slot.active{display:block}
.mode-badge{position:absolute;top:10px;right:10px;z-index:800;background:rgba(10,10,10,.85);border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.08em;backdrop-filter:blur(4px)}

/* Toast */
.toast{position:fixed;bottom:18px;right:18px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 14px;font-family:'Space Mono',monospace;font-size:.68rem;z-index:9999;opacity:0;transition:all .22s}
.toast.show{opacity:1}
.toast.success{border-color:#44ff44;color:#44ff44}
.toast.error{border-color:#ff4444;color:#ff4444}
</style>
</head>
<body>

<header>
  <div class="logo">Zone<span>Map</span><sub>AU/NZ</sub></div>
  <div class="map-tabs-bar" id="map-tabs-bar"></div>
  <button class="add-map-btn" onclick="addMap()">＋ New Map</button>
  <div class="version-toggle">
    <button class="v-btn va" onclick="setMode('a')">Ver A</button>
    <button class="v-btn" onclick="setMode('diff')">Diff</button>
    <button class="v-btn" onclick="setMode('b')">Ver B</button>
  </div>
  <div class="db-status">
    <div class="db-dot" id="db-dot"></div>
    <span class="db-label" id="db-label" style="font-size:0.6rem;color:var(--muted)">No DB</span>
  </div>
  <button class="load-btn" id="load-btn" onclick="loadFromSupabase()" disabled>↓ Load</button>
  <button class="save-btn" id="save-btn" onclick="saveToSupabase()" disabled>↑ Save</button>
  <div class="legend" id="legend"></div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="stabs">
      <button class="stab sa" id="stab-input" onclick="setSideTab('input')">Input</button>
      <button class="stab" id="stab-tags" onclick="setSideTab('tags')">Tags</button>
      <button class="stab" id="stab-db" onclick="setSideTab('db')">DB</button>
    </div>
    <div class="map-name-row">
      <input class="mn-input" id="map-name-input" value="Map 1" oninput="renameCurrentMap(this.value)">
    </div>

    <div class="spane" id="pane-input">
      <div class="vlabel la">// Postcodes</div>
      <textarea id="input-a" class="postal-input" style="width:100%; height:150px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:8px; font-family:'Space Mono'; font-size:0.7rem;" placeholder="Enter postcodes..."></textarea>
      <button class="abtn abtn-a" style="margin-top:10px" onclick="plotVersion('a')">Plot to Map</button>
      <div id="chips-a" class="chips" style="margin-top:10px"></div>
    </div>

    <div class="spane" id="pane-tags" style="display:none; padding:0;">
       <div class="pc-table-wrap">
         <table class="pc-table">
           <thead><tr><th>Code</th><th>Country</th><th>Branch</th></tr></thead>
           <tbody id="pc-tbody"></tbody>
         </table>
       </div>
    </div>

    <div class="spane" id="pane-db" style="display:none">
       <div id="db-info-box" style="font-size:0.65rem; color:var(--muted); line-height:1.6">
         Checking <b>supabase-config.js</b>...
       </div>
       <button class="abtn abtn-g" style="margin-top:10px" onclick="toggleSchema()">View SQL Schema</button>
       <div id="schema-area" style="display:none; margin-top:10px">
         <pre id="schema-box" style="font-size:0.5rem; background:#000; padding:10px; overflow:auto"></pre>
       </div>
    </div>
  </div>

  <div class="map-area" id="map-area"></div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// GLOBAL STATE & SPATIAL CACHE
// ═══════════════════════════════════════════════════════
const polyCache = {}; 
const geocodeCache = {};
let branches = ['North', 'South', 'East', 'West'];
let maps = [];
let activeMapId = null;
let currentMode = 'a';
let sbClient = null;
let dbConnected = false;

function getActive(){ return maps.find(m=>m.id===activeMapId)||null; }

// ═══════════════════════════════════════════════════════
// SPATIAL BOUNDARY LOGIC (SHAPEFILES)
// ═══════════════════════════════════════════════════════

async function fetchPolygon(code, country) {
  if (polyCache[code] !== undefined) return polyCache[code];

  // Logic: Ensure code is 4 digits (e.g., pad 800 to 0800)
  const paddedCode = code.padStart(4, '0');

  // AU: ABS ASGS 2021 Postal Areas (Free API)
  if (!country || country === 'AU') {
    try {
      const url = `https://geo.abs.gov.au/arcgis/rest/services/ASGS2021/POA/MapServer/0/query?where=POA_CODE21%3D'${paddedCode}'&outFields=POA_CODE21&returnGeometry=true&outSR=4326&f=geojson`;
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();
        if (data.features && data.features.length > 0) {
          polyCache[code] = data.features[0].geometry;
          return polyCache[code];
        }
      }
    } catch(e) { console.warn(`AU Shape failed for ${code}`); }
  }

  // NZ: Stats NZ Postcode Boundaries
  if (!country || country === 'NZ') {
    try {
      const url = `https://services1.arcgis.com/S6v6f6uLpCIsyF9x/arcgis/rest/services/NZ_Postcode_Boundaries/FeatureServer/0/query?where=Postcode%3D'${paddedCode}'&outFields=Postcode&returnGeometry=true&outSR=4
